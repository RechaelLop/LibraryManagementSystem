{% extends "base.html" %}

{% block content %}
<h2>📤 Borrow a Book</h2>
<p style="color: #7f8c8d; margin-bottom: 20px;">Process a book borrowing</p>

<div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px;">
    <form id="borrowForm">
        <div class="form-group">
            <label for="member_id">Member ID:</label>
            <input type="number" id="member_id" required placeholder="Enter member ID">
        </div>
        
        <div class="form-group">
            <label for="book_id">Book ID:</label>
            <input type="number" id="book_id" required placeholder="Enter book ID">
        </div>
        
        <div class="form-group">
            <label for="days">Days to Borrow:</label>
            <input type="number" id="days" value="14" min="1" max="30">
        </div>
        
        <button type="submit" class="btn btn-success" style="width: 100%;">📤 Borrow Book</button>
    </form>
    
    <div id="borrowResult" style="margin-top: 20px;"></div>
</div>

<div style="margin-top: 30px;">
    <h3>📋 Recent Borrowings</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Book</th>
                    <th>Member</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="borrowingsTableBody">
                <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('borrowForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const member_id = document.getElementById('member_id').value;
        const book_id = document.getElementById('book_id').value;
        const days = document.getElementById('days').value;
        
        const formData = new FormData();
        formData.append('member_id', member_id);
        formData.append('book_id', book_id);
        formData.append('days', days);
        
        try {
            const response = await fetch('/api/borrow', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            const resultDiv = document.getElementById('borrowResult');
            
            if (result.success) {
                resultDiv.innerHTML = `<div class="alert alert-success">✅ ${result.message}</div>`;
                loadBorrowings();
            } else {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.message}</div>`;
            }
        } catch (error) {
            document.getElementById('borrowResult').innerHTML = `<div class="alert alert-danger">❌ Error processing borrow request</div>`;
        }
    });
    
    async function loadBorrowings() {
        try {
            const response = await fetch('/api/borrowings');
            const borrowings = await response.json();
            
            const tbody = document.getElementById('borrowingsTableBody');
            tbody.innerHTML = '';
            
            if (borrowings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">No current borrowings</td></tr>`;
                return;
            }
            
            borrowings.forEach(b => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${b.id}</td>
                    <td>${b.book}</td>
                    <td>${b.member}</td>
                    <td>${b.due_date}</td>
                    <td style="color: ${b.status === 'OVERDUE' ? '#e74c3c' : '#27ae60'}; font-weight: 600;">
                        ${b.status}
                    </td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            // Silently fail
        }
    }
    
    // Add borrowings API endpoint
    // Add this to app.py:
    // @app.route('/api/borrowings')
    // def get_borrowings(): ...
    
    document.addEventListener('DOMContentLoaded', loadBorrowings);
</script>
{% endblock %}
