{% extends "base.html" %}

{% block content %}
<h2>🔍 Search Books</h2>
<p style="color: #7f8c8d; margin-bottom: 20px;">Find books by title, author, or genre</p>

<div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: end;">
        <div class="form-group" style="flex: 2; min-width: 200px; margin-bottom: 0;">
            <label for="searchTerm">Search Term:</label>
            <input type="text" id="searchTerm" placeholder="Enter title or author...">
        </div>
        
        <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
            <label for="searchGenre">Genre:</label>
            <select id="searchGenre">
                <option value="All">All Genres</option>
                <option value="Fiction">Fiction</option>
                <option value="Science Fiction">Science Fiction</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Romance">Romance</option>
                <option value="Mystery">Mystery</option>
                <option value="Non-Fiction">Non-Fiction</option>
            </select>
        </div>
        
        <div class="form-group" style="flex: 0; margin-bottom: 0;">
            <label style="display: block; visibility: hidden;">.</label>
            <button class="btn btn-primary" onclick="performSearch()">🔍 Search</button>
        </div>
    </div>
    
    <div style="margin-top: 15px;">
        <label>
            <input type="checkbox" id="availableOnly" onchange="performSearch()">
            Only show available books
        </label>
    </div>
</div>

<div id="searchResults" style="margin-top: 30px;">
    <p style="color: #7f8c8d; text-align: center; padding: 40px;">Enter a search term to find books</p>
</div>

<script>
    async function performSearch() {
        const term = document.getElementById('searchTerm').value.trim();
        const genre = document.getElementById('searchGenre').value;
        const available = document.getElementById('availableOnly').checked;
        
        if (!term) {
            document.getElementById('searchResults').innerHTML = `<p style="color: #7f8c8d; text-align: center; padding: 40px;">Please enter a search term</p>`;
            return;
        }
        
        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(term)}&genre=${encodeURIComponent(genre)}&available=${available}`);
            const books = await response.json();
            
            const resultsDiv = document.getElementById('searchResults');
            
            if (books.error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">❌ ${books.error}</div>`;
                return;
            }
            
            if (books.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-warning">
                        No books found matching "<strong>${term}</strong>"
                    </div>
                `;
                return;
            }
            
            let html = `<div class="alert alert-success">✅ Found ${books.length} books matching "<strong>${term}</strong>"</div>`;
            html += `<div class="table-container"><table><thead><tr>
                <th>Title</th>
                <th>Author</th>
                <th>Genre</th>
                <th>Available</th>
                <th>Total</th>
            </tr></thead><tbody>`;
            
            books.forEach(book => {
                html += `<tr>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td>${book.genre || 'N/A'}</td>
                    <td style="color: ${book.available > 0 ? '#27ae60' : '#e74c3c'}; font-weight: 600;">
                        ${book.available}
                    </td>
                    <td>${book.total}</td>
                </tr>`;
            });
            
            html += `</tbody></table></div>`;
            resultsDiv.innerHTML = html;
            
        } catch (error) {
            document.getElementById('searchResults').innerHTML = `<div class="alert alert-danger">❌ Error searching</div>`;
        }
    }
    
    // Search on Enter key
    document.getElementById('searchTerm').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>
{% endblock %}
