{% extends "base.html" %}

{% block content %}
<h2>📥 Return a Book</h2>
<p style="color: #7f8c8d; margin-bottom: 20px;">Process a book return</p>

<div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px;">
    <form id="returnForm">
        <div class="form-group">
            <label for="borrow_id">Borrow ID:</label>
            <input type="number" id="borrow_id" required placeholder="Enter borrow ID">
        </div>
        
        <button type="submit" class="btn btn-danger" style="width: 100%;">📥 Return Book</button>
    </form>
    
    <div id="returnResult" style="margin-top: 20px;"></div>
</div>

<div style="margin-top: 30px;">
    <h3>⚠️ Overdue Books</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Book</th>
                    <th>Member</th>
                    <th>Days Overdue</th>
                    <th>Fine</th>
                </tr>
            </thead>
            <tbody id="overdueTableBody">
                <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('returnForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const borrow_id = document.getElementById('borrow_id').value;
        
        const formData = new FormData();
        formData.append('borrow_id', borrow_id);
        
        try {
            const response = await fetch('/api/return', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            const resultDiv = document.getElementById('returnResult');
            
            if (result.success) {
                resultDiv.innerHTML = `<div class="alert alert-success">✅ ${result.message}</div>`;
                loadOverdueBooks();
            } else {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.message}</div>`;
            }
        } catch (error) {
            document.getElementById('returnResult').innerHTML = `<div class="alert alert-danger">❌ Error processing return request</div>`;
        }
    });
    
    async function loadOverdueBooks() {
        try {
            const response = await fetch('/api/overdue');
            const books = await response.json();
            
            const tbody = document.getElementById('overdueTableBody');
            tbody.innerHTML = '';
            
            if (books.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">🎉 No overdue books! Great job!</td></tr>`;
                return;
            }
            
            books.forEach(book => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.id}</td>
                    <td>${book.book}</td>
                    <td>${book.member}</td>
                    <td style="color: #e74c3c; font-weight: 600;">${book.days} days</td>
                    <td style="color: #e74c3c; font-weight: 600;">$${book.fine}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            // Silently fail
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadOverdueBooks);
</script>
{% endblock %}
