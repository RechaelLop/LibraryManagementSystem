{% extends "base.html" %}

{% block content %}
<h2>📖 Books</h2>
<p style="color: #7f8c8d; margin-bottom: 20px;">Manage your book inventory</p>

<div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
    <input type="text" id="searchInput" placeholder="Search by title or author..." style="padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 200px;">
    <button class="btn btn-primary" onclick="searchBooks()">🔍 Search</button>
    <button class="btn btn-success" onclick="refreshBooks()">🔄 Refresh</button>
    <button class="btn btn-warning" onclick="addBook()">➕ Add Book</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Genre</th>
                <th>Available</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="booksTableBody">
            <tr>
                <td colspan="6" style="text-align: center; padding: 30px;">Loading books...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    async function loadBooks() {
        try {
            const response = await fetch('/api/books');
            const books = await response.json();
            
            const tbody = document.getElementById('booksTableBody');
            tbody.innerHTML = '';
            
            if (books.error) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px;">❌ ${books.error}</td></tr>`;
                return;
            }
            
            if (books.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px;">No books found</td></tr>`;
                return;
            }
            
            books.forEach(book => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.id}</td>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td>${book.genre || 'N/A'}</td>
                    <td style="color: ${book.available > 0 ? '#27ae60' : '#e74c3c'}; font-weight: 600;">
                        ${book.available}
                    </td>
                    <td>${book.total}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            document.getElementById('booksTableBody').innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px;">❌ Error loading books</td></tr>`;
        }
    }
    
    async function searchBooks() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        if (!searchTerm) {
            loadBooks();
            return;
        }
        
        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(searchTerm)}`);
            const books = await response.json();
            
            const tbody = document.getElementById('booksTableBody');
            tbody.innerHTML = '';
            
            if (books.error) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px;">❌ ${books.error}</td></tr>`;
                return;
            }
            
            if (books.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px;">No books found matching "${searchTerm}"</td></tr>`;
                return;
            }
            
            books.forEach(book => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.id}</td>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td>${book.genre || 'N/A'}</td>
                    <td style="color: ${book.available > 0 ? '#27ae60' : '#e74c3c'}; font-weight: 600;">
                        ${book.available}
                    </td>
                    <td>${book.total}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            alert('Error searching books');
        }
    }
    
    function refreshBooks() {
        document.getElementById('searchInput').value = '';
        loadBooks();
    }
    
    function addBook() {
        alert('Add book functionality - Coming soon!');
    }
    
    // Load books on page load
    document.addEventListener('DOMContentLoaded', loadBooks);
</script>
{% endblock %}
